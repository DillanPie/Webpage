<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>

    <!-- External Libraries -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/mshaugh/nerdfont-webfonts/build/firacode-nerd-font.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Page-Specific Styles -->
    <script type="module">
      import "/css/weather.css";
    </script>

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon_io/site.webmanifest" />

    <!-- Library Scripts -->

    <!-- External Libraries (CSS is now handled by Vite) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/mshaugh/nerdfont-webfonts/build/firacode-nerd-font.css"
    />
  </head>
  <body class="weather-loading">
    <!-- Start with loading class on body -->
    <!-- Sticky Navbar -->
    <div id="navbar" class="navbar"></div>

    <!-- Header Section -->
    <div class="header">Weather Dashboard</div>

    <!-- Container 1: Current Weather & Search -->
    <div class="container" id="current-weather-container">
      <div class="weather-header">
        <span class="weather-label">Weather in</span>
        <input
          type="text"
          id="weather-search-input"
          class="weather-search"
          placeholder="Loading..."
        />
        <button class="weather-search-btn">Go</button>
      </div>
      <div class="weather-error" id="weather-error-message"></div>
      <div id="current-weather">
        <h2 class="city-name">City Name</h2>
        <div class="current-main">
          <div class="current-temp">--°F</div>
          <img
            src="https://openweathermap.org/img/wn/04n@2x.png"
            alt="Weather Icon"
            class="current-icon"
          />
        </div>
        <p class="current-description">Weather Description</p>
        <div class="current-extras">
          <div>Feels Like: <span id="feels-like">--°F</span></div>
          <div>
            H: <span id="high-temp">--°F</span> / L:
            <span id="low-temp">--°F</span>
          </div>
          <div>Wind: <span id="wind-speed">-- mph</span></div>
          <div>Humidity: <span id="humidity">--%</span></div>
        </div>
      </div>
    </div>

    <!-- Container 2: Hourly Forecast -->
    <div class="container" id="hourly-container">
      <h3 class="subtitle">Hourly Forecast</h3>
      <div
        class="chart-container"
        style="
          position: relative;
          height: 30vh;
          width: 100%;
          margin-bottom: 1rem;
        "
      >
        <canvas id="hourly-chart"></canvas>
      </div>
      <div class="hourly-scroll-wrapper">
        <button
          class="scroll-arrow scroll-arrow-left"
          id="hourly-scroll-left"
          aria-label="Scroll left"
        >
          
        </button>
        <button
          class="scroll-arrow scroll-arrow-right"
          id="hourly-scroll-right"
          aria-label="Scroll right"
        >
          
        </button>
        <div class="hourly-forecast-container" id="hourly-forecast"></div>
      </div>
      <div class="hourly-forecast-container" id="hourly-forecast"></div>
    </div>

    <!-- Container 3: Daily Forecast -->
    <div class="container" id="daily-container">
      <h3 class="subtitle">7-Day Forecast</h3>
      <div class="daily-forecast-container" id="daily-forecast"></div>
    </div>

    <!-- Container 4: Map -->
    <div class="container" id="map-container">
      <div class="map-header">
        <h3>Live Weather</h3>
        <div id="timestamp-container">
          <p>Last updated: <span id="timestamp"></span></p>
        </div>
        <div id="map-legend">
          <ul>
            <li>
              <span style="background-color: var(--radar-light-pink)"></span>
              Light
            </li>
            <li>
              <span style="background-color: var(--radar-blue)"></span>
              Moderate
            </li>
            <li>
              <span style="background-color: var(--radar-yellow)"></span> Heavy
            </li>
            <li>
              <span style="background-color: var(--radar-orange)"></span> V.
              Heavy
            </li>
          </ul>
        </div>
      </div>
      <div id="map"></div>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Modal-->
    <div id="map-modal" class="map-modal">
      <span class="close-modal" title="Close">&times;</span>
      <div id="expanded-map"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/js/include/pages/weather-page.js"></script>
    <script type="module" src="/js/mock-weather.js"></script>
  </body>
</html>
