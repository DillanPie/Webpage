<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Bonsai Garden</title>

    <!-- Global & Component Styles -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/footer.css" />

    <!-- Page-Specific Styles -->
    <link rel="stylesheet" href="css/bonsai.css" />
  </head>
  <body>
    <!-- Use the standard JS-powered navbar -->
    <div id="navbar" class="navbar"></div>

    <!-- Wrap main content in the .container class for consistent layout -->
    <div class="container">
      <h1>The Digital Bonsai Garden</h1>

      <p id="seed-display">> Loading seed...</p>

      <!-- New viewer container for the background -->
      <div class="bonsai-viewer">
        <!-- The SVG canvas for the bonsai tree -->
        <svg
          id="bonsai-canvas"
          viewBox="0 0 500 500"
          xmlns="http://www.w3.org/2000/svg"
        ></svg>
      </div>
    </div>

    <!-- Use the standard JS-powered footer -->
    <div id="footer-placeholder"></div>

    <!-- Scripts for dynamic content and the bonsai renderer -->
    <script src="js/navbar.js"></script>
    <script src="js/footer.js"></script>
    <script src="/js/bonsai-renderer.js"></script>
  </body>
</html>
