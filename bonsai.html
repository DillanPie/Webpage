<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page-specific title -->
    <title>Digital Bonsai Garden</title>
    <meta
      name="description"
      content="An interactive, procedurally generated digital bonsai tree."
    />

    <!-- Global Styles and FOUC Fix -->
    <link rel="stylesheet" href="/css/style.css" />
    <noscript>
      <style>
        body {
          opacity: 1 !important;
        }
      </style>
    </noscript>

    <!-- Favicon web icon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="/favicon_io/site.webmanifest" />

    <!-- Load the JavaScript for THIS page, which also loads main.js -->
    <script type="module" src="/js/include/pages/bonsai-page.js"></script>
  </head>

  <body>
    <!-- Sticky Navbar Placeholder (filled by JavaScript) -->
    <div id="navbar" class="navbar"></div>

    <!-- Consistent page header -->
    <div class="header">The Digital Bonsai Garden</div>

    <div class="container">
      <div class="bonsai-viewer">
        <svg
          id="bonsai-canvas"
          viewBox="0 0 500 500"
          xmlns="http://www.w3.org/2000/svg"
        ></svg>
      </div>

      <div id="bonsai-controls">
        <p id="seed-display">> Loading seed...</p>
        <p>Age: <span id="age-display">0</span> years</p>
        <button id="pass-time-btn">Pass Time</button>
      </div>

        </div>
      </div>
    </div>
    <!-- Footer Placeholder (filled by JavaScript) -->
    <div id="footer-placeholder"></div>
  </body>
</html>
