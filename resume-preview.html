<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Preview - Dillan Suon</title>
    <!-- Styles -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/mshaugh/nerdfont-webfonts/build/firacode-nerd-font.css"
    />
    <script type="module">
      import "/css/resume-preview.css";
    </script>
    >
    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon_io/site.webmanifest" />
  </head>
  <body>
    <div id="navbar" class="navbar"></div>
    <div class="header">Resume Preview</div>

    <div class="container">
      <h1 class="title">Dillan Suon's Resume</h1>
      <p class="subtitle">Download or View Below</p>
      <div class="resume-links">
        <a class="btn btn-default" href="resume/Dillan-Suon-Resume.pdf" download
          >󰇚 Download Resume</a
        >
        <a class="btn btn-default" href="index.html"> Back to Portfolio</a>
      </div>

      <!-- MODIFIED CONTAINER -->
      <div class="pdf-container">
        <!-- 1. Add this loading indicator -->
        <div class="loading-indicator">
          <div class="spinner"></div>
          <p>Loading Resume...</p>
        </div>
        <!-- The canvas remains the same -->
        <canvas id="pdf-render" class="pdf-viewer"></canvas>
      </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/js/include/main.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"
      defer
    ></script>
    <script src="js/resume-preview.js" defer></script>
  </body>
</html>
